<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DP スケジューラー</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#0d1117;
  --bg2:#161b22;
  --bg3:#1c2333;
  --border:#30363d;
  --border2:#444c56;
  --text:#e6edf3;
  --text2:#8b949e;
  --text3:#484f58;
  --blue:#4facfe;
  --blue2:#00f2fe;
  --green:#39d353;
  --green2:#00b4d8;
  --amber:#f5a623;
  --red:#ff6b6b;
  --grad-blue:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);
  --grad-green:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%);
  --grad-amber:linear-gradient(135deg,#f7971e 0%,#ffd200 100%);
  --grad-red:linear-gradient(135deg,#f83600 0%,#f9d423 100%);
  --glow-blue:0 0 12px rgba(79,172,254,0.4);
  --glow-green:0 0 12px rgba(57,211,83,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;font-size:13px;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(79,172,254,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,242,254,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}
#wrap{padding:12px;max-width:1100px;margin:0 auto;position:relative;z-index:1}

/* HEADER */
.hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;background:linear-gradient(135deg,rgba(22,27,34,0.95) 0%,rgba(28,35,51,0.95) 100%);border-radius:12px;padding:12px 16px;border:1px solid var(--border);backdrop-filter:blur(10px);position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--blue2),transparent)}
.app-logo{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;background:var(--grad-blue);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px;white-space:nowrap}
.nbtn{background:rgba(48,54,61,0.8);border:1px solid var(--border2);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--text2);font-weight:500;transition:all 0.2s}
.nbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--blue);box-shadow:var(--glow-blue)}
.wtitle{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:var(--text);letter-spacing:0.5px}
.spacer{flex:1}
.legend{display:flex;gap:8px;align-items:center}
.ld{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2)}
.ldot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}
.sbtn{background:rgba(48,54,61,0.8);border:1px solid var(--border2);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--text2);font-weight:500;transition:all 0.2s}
.sbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--blue);box-shadow:var(--glow-blue)}
.abtn{background:linear-gradient(135deg,#185FA5,#4facfe);color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;box-shadow:0 2px 12px rgba(79,172,254,0.3)}
.abtn:hover{box-shadow:0 4px 20px rgba(79,172,254,0.5);transform:translateY(-1px)}
.sync-badge{font-size:10px;padding:3px 10px;border-radius:12px;font-weight:600;letter-spacing:0.3px}
.sync-ok{background:rgba(57,211,83,0.15);color:var(--green);border:1px solid rgba(57,211,83,0.3)}
.sync-err{background:rgba(255,107,107,0.15);color:var(--red);border:1px solid rgba(255,107,107,0.3)}

/* MAINT ROW */
.mrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 16px;background:linear-gradient(135deg,rgba(22,27,34,0.95),rgba(28,35,51,0.95));border-radius:12px;margin-bottom:10px;border:1px solid var(--border);position:relative;overflow:hidden}
.mrow::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(79,172,254,0.3),transparent)}
.mrow-label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.mbtn{padding:6px 16px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;transition:all 0.2s;letter-spacing:0.3px}
.mbtn-ok{background:rgba(57,211,83,0.1);color:#39d353;border-color:rgba(57,211,83,0.4);box-shadow:0 0 8px rgba(57,211,83,0.15)}
.mbtn-ok:hover{box-shadow:var(--glow-green)}
.mbtn-ng{background:rgba(255,107,107,0.1);color:var(--red);border-color:rgba(255,107,107,0.4);box-shadow:0 0 8px rgba(255,107,107,0.15)}

/* CALENDAR */
.calwrap{overflow-x:auto;background:linear-gradient(135deg,rgba(22,27,34,0.98),rgba(28,35,51,0.98));border-radius:12px;border:1px solid var(--border);position:relative;overflow:hidden}
.calwrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--blue2),transparent)}
.cal-inner{min-width:680px}
.subhdr{display:grid;grid-template-columns:52px repeat(14,1fr);border-bottom:1px solid var(--border)}
.sh-corner{background:rgba(13,17,23,0.5);border-right:1px solid var(--border)}
.sh-day{display:flex;border-right:1px solid var(--border)}
.sh-day:last-child{border-right:none}
.sh-lane{flex:1;padding:4px 0;text-align:center;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.sh-s{color:var(--blue);background:rgba(79,172,254,0.06);border-right:1px solid rgba(79,172,254,0.15)}
.sh-i{color:var(--green);background:rgba(57,211,83,0.06)}
.sh-maint{color:var(--red)!important;background:rgba(255,107,107,0.06)!important;text-decoration:line-through}
.dayhdrs{display:grid;grid-template-columns:52px repeat(14,1fr);border-bottom:1px solid var(--border2)}
.dh-corner{background:rgba(13,17,23,0.5);border-right:1px solid var(--border)}
.dh{background:rgba(13,17,23,0.3);border-right:1px solid var(--border);padding:7px 4px;text-align:center}
.dh:last-child{border-right:none}
.dh.today-col{background:linear-gradient(180deg,rgba(79,172,254,0.1),rgba(79,172,254,0.04))}
.dow{font-size:9px;color:var(--text3);margin-bottom:3px;font-weight:600;letter-spacing:0.5px}
.dt{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--text2)}
.dh.today-col .dt{color:var(--blue);text-shadow:0 0 8px rgba(79,172,254,0.5)}
.cal-body{display:grid;grid-template-columns:52px repeat(14,1fr)}
.lane{flex:1;position:relative;height:100%}
.lane-s{border-right:1px solid rgba(79,172,254,0.08);background:rgba(79,172,254,0.02)}
.lane-i{background:rgba(57,211,83,0.02)}
.lane-maint{background:repeating-linear-gradient(45deg,rgba(255,107,107,0.05),rgba(255,107,107,0.05) 4px,transparent 4px,transparent 10px);cursor:not-allowed}
.lane-over{outline:1px dashed var(--blue);outline-offset:-1px;background:rgba(79,172,254,0.06)}
.ev{position:absolute;left:1px;right:1px;border-radius:4px;padding:3px 5px;font-size:9px;cursor:grab;overflow:hidden;z-index:10;line-height:1.35;transition:filter 0.15s,transform 0.15s}
.ev:hover{filter:brightness(1.15);transform:scaleX(0.98);z-index:20}
.ev-title{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-sub{opacity:0.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:8px;margin-top:1px}
.dprev{position:absolute;left:1px;right:1px;border-radius:4px;z-index:8;pointer-events:none;border:1px dashed var(--blue);background:rgba(79,172,254,0.08)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px)}
.modal-box{background:linear-gradient(160deg,#161b22 0%,#1c2333 100%);border:1px solid var(--border2);border-radius:14px;padding:24px;width:360px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 0 1px rgba(79,172,254,0.1);position:relative}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--blue2),transparent);border-radius:14px 14px 0 0}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text);letter-spacing:0.5px}
.fl{margin-bottom:12px}
.fl-label{display:block;font-size:10px;color:var(--text2);margin-bottom:5px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase}
.fi{width:100%;font-size:13px;padding:8px 11px;border-radius:7px;border:1px solid var(--border2);background:rgba(13,17,23,0.8);color:var(--text);outline:none;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(79,172,254,0.2)}
textarea.fi{resize:vertical;min-height:42px}
.ptabs{display:flex;gap:4px}
.pt{flex:1;padding:7px 4px;text-align:center;font-size:12px;border-radius:7px;border:1px solid var(--border);cursor:pointer;font-weight:700;color:var(--text2);transition:all 0.2s;letter-spacing:0.3px}
.ubar{display:flex;gap:4px}
.uo{flex:1;padding:6px 2px;text-align:center;font-size:10px;border-radius:6px;border:1px solid transparent;cursor:pointer;font-weight:700;transition:all 0.2s}
.dur-row{display:flex;gap:10px;align-items:center}
.dur-input{width:90px;text-align:center;font-size:22px;font-weight:700;padding:6px 10px;font-family:'Rajdhani',sans-serif}
.dur-unit{font-size:13px;color:var(--text2)}
.dur-hint{font-size:10px;color:var(--text3);margin-left:auto}
.divider{border:none;border-top:1px solid var(--border);margin:10px 0 14px}
.btn-row{display:flex;gap:8px;align-items:center}
.btn{padding:8px 16px;border-radius:7px;border:1px solid var(--border2);cursor:pointer;font-size:12px;font-weight:700;background:rgba(48,54,61,0.5);color:var(--text2);transition:all 0.2s;letter-spacing:0.3px}
.btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-primary{background:linear-gradient(135deg,#185FA5,#4facfe);color:#fff;border:none;box-shadow:0 2px 12px rgba(79,172,254,0.3)}
.btn-primary:hover{box-shadow:0 4px 20px rgba(79,172,254,0.5);transform:translateY(-1px)}
.btn-danger{color:var(--red);border-color:rgba(255,107,107,0.3);background:rgba(255,107,107,0.05)}
.btn-danger:hover{background:rgba(255,107,107,0.1)}
.status-box{font-size:11px;padding:8px 11px;border-radius:7px;margin-bottom:10px}
.status-err{background:rgba(255,107,107,0.1);color:var(--red);border:1px solid rgba(255,107,107,0.3)}
.modal-note{font-size:9px;color:var(--text3);text-align:center;margin-top:10px;letter-spacing:0.3px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1a2f1a,#1e3a1e);color:var(--green);padding:11px 24px;border-radius:8px;font-size:12px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.4),0 0 0 1px rgba(57,211,83,0.3);white-space:nowrap;transition:opacity 0.4s;letter-spacing:0.3px}
</style>
</head>
<body>
<div id="wrap">
  <div class="hdr">
    <button class="nbtn" id="btnPrev" style="display:none">◀</button>
    <button class="nbtn" id="btnNext" style="display:none">▶</button>
    <span class="app-logo">3DP SCHEDULER</span>
    <span class="wtitle" id="wtitle"></span>
    <div class="spacer"></div>
    <div class="legend">
      <div class="ld"><span class="ldot" style="background:linear-gradient(135deg,#4facfe,#00f2fe)"></span>低</div>
      <div class="ld"><span class="ldot" style="background:linear-gradient(135deg,#43e97b,#38f9d7)"></span>中</div>
      <div class="ld"><span class="ldot" style="background:linear-gradient(135deg,#f7971e,#ffd200)"></span>高</div>
      <div class="ld"><span class="ldot" style="background:linear-gradient(135deg,#f83600,#f9d423)"></span>超緊急</div>
    </div>
    <span class="sync-badge sync-ok" id="syncBadge">● 接続中</span>
    <button class="sbtn" id="btnSettings">⚙ 設定</button>
    <button class="abtn" id="btnAdd">＋ ジョブを追加</button>
  </div>
  <div class="mrow">
    <span class="mrow-label">プリンター状態</span>
    <button class="mbtn mbtn-ok" id="mb-s">🖨 寒川　● 稼働中</button>
    <button class="mbtn mbtn-ok" id="mb-i">🖨 岩手　● 稼働中</button>
  </div>
  <div class="calwrap">
    <div class="cal-inner" id="calinner"></div>
  </div>
</div>

<script>
// ===== MSAL 認証設定 =====
var MSAL_CONFIG = {
  auth: {
    clientId: 'a55b9b37-d729-48b5-a2ea-3fa0183926ee',
    authority: 'https://login.microsoftonline.com/59ffe9c5-87c8-45f8-bbe3-23567148f2c0',
    redirectUri: 'https://ksyp2549-oss.github.io/3dp-scheduler/'
  },
  cache: { cacheLocation: 'sessionStorage' }
};
var PA_SCOPES = ['https://service.flow.microsoft.com//.default'];
var msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
var _msalInitialized = false;

async function initMsal() {
  if (_msalInitialized) return;
  await msalInstance.initialize();
  _msalInitialized = true;
  var resp = await msalInstance.handleRedirectPromise();
  if (resp) msalInstance.setActiveAccount(resp.account);
}

async function getToken() {
  await initMsal();
  var account = msalInstance.getActiveAccount() || (msalInstance.getAllAccounts()[0] || null);
  if (!account) {
    await msalInstance.loginRedirect({ scopes: PA_SCOPES });
    return null;
  }
  try {
    var r = await msalInstance.acquireTokenSilent({ scopes: PA_SCOPES, account: account });
    return r.accessToken;
  } catch(e) {
    await msalInstance.acquireTokenRedirect({ scopes: PA_SCOPES, account: account });
    return null;
  }
}

// ===== CONFIG =====
// ★ SharePoint設定 ★
var SP_SITE = 'https://kasaigroup-my.sharepoint.com/personal/kiyohara-syoki_kasai-group_com';
var SP_LIST = '3 DP管理表';
var PA_READ = 'https://default59ffe9c587c845f8bbe323567148f2.c0.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/54ed202cea1042098019c30460e33a30/triggers/manual/paths/invoke?api-version=1';
var PA_WRITE = 'https://default59ffe9c587c845f8bbe323567148f2.c0.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4b9e80269399468db427ba66044b9187/triggers/manual/paths/invoke?api-version=1';
var POLL_INTERVAL = 15000;

var DAYS=['日','月','火','水','木','金','土'];
var UC={
  low:    {bg:'rgba(79,172,254,0.18)',tx:'#7ec8ff',bd:'rgba(79,172,254,0.6)'},
  mid:    {bg:'rgba(67,233,123,0.15)',tx:'#5ddb8c',bd:'rgba(67,233,123,0.6)'},
  high:   {bg:'rgba(247,151,30,0.18)',tx:'#ffc060',bd:'rgba(247,151,30,0.6)'},
  urgent: {bg:'rgba(248,54,0,0.18)',  tx:'#ff7c5c',bd:'rgba(248,54,0,0.6)'}
};
var NIGHT_H=16, DAY_H=64;
function hrH(h){return(h>=8&&h<=20)?DAY_H:NIGHT_H}
function hrTop(h){var t=0;for(var i=0;i<h;i++)t+=hrH(i);return t}
function totalH(){var t=0;for(var i=0;i<24;i++)t+=hrH(i);return t}

var evs=[], wOff=0, maint={s:false,i:false}, cfg={from:'09:00',to:'17:00',gap:240,weekend:false,wdMode:'weekday',startOffset:60};
var dragEv=null, pollTimer=null;

function fmtD(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}
function fmtHm(h,m){return('0'+h).slice(-2)+':'+('0'+(m||0)).slice(-2)}
function toMin(h,m){return h*60+(m||0)}
function isToday(d){return d.toDateString()===new Date().toDateString()}
function getWS(){var d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());return d}

// ===== SharePoint REST API =====
function setSyncBadge(ok, msg){
  var b=document.getElementById('syncBadge');
  b.className='sync-badge '+(ok?'sync-ok':'sync-err');
  b.textContent=ok?('● '+(msg||'接続中')):('✕ '+(msg||'接続エラー'));
}

function spHeaders(method, extra){
  var h={
    'Accept':'application/json;odata=nometadata',
    'Content-Type':'application/json;odata=nometadata'
  };
  if(method==='POST'||method==='PATCH'||method==='DELETE'){
    h['X-RequestDigest']=window._spDigest||'';
  }
  return Object.assign(h, extra||{});
}

// RequestDigest取得（書き込み時に必要）
async function getDigest(){
  try{
    var r=await fetch(SP_SITE+'/_api/contextinfo',{method:'POST',headers:{'Accept':'application/json;odata=nometadata','Content-Type':'application/json'}});
    var d=await r.json();
    window._spDigest=d.FormDigestValue;
  }catch(e){}
}

// データをSharePointリストから1アイテム（JSON文字列）として保存
var SP_ITEM_ID = null; // 既存アイテムのID

// ===== 同時編集対応：差分保存ヘルパー =====

// SharePointから最新データを取得（グローバル状態は更新しない）
async function fetchLatestData(){
  try{
    var token=await getToken();
    if(!token)return null;
    var r=await fetch(PA_READ,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({})});
    if(!r.ok)return null;
    var raw=await r.text();
    var items=[];
    try{var parsed=JSON.parse(raw);items=Array.isArray(parsed)?parsed:(parsed.value||[parsed]);}catch(e){}
    if(items.length>0){
      var item=items[items.length-1];
      SP_ITEM_ID=item.Id||item.id||1;
      var titleStr=item.Title||item.title||'';
      if(titleStr){
        var payload=JSON.parse(titleStr);
        return{evs:payload.evs||[],maint:Object.assign({s:false,i:false},payload.maint||{}),cfg:Object.assign({from:'09:00',to:'17:00',gap:240,weekend:false,wdMode:'weekday',startOffset:60},payload.cfg||{})};
      }
    }
  }catch(e){}
  return null;
}

// ローカル状態のスナップショットを返す（フォールバック用）
function localData(){
  return{evs:evs.slice(),maint:Object.assign({},maint),cfg:Object.assign({},cfg)};
}

// データオブジェクトをSharePointに保存し、グローバル状態を更新する
async function persistWithData(data){
  evs=data.evs; maint=data.maint; cfg=data.cfg;
  try{localStorage.setItem('3dp_sp_local',JSON.stringify(data));}catch(e){}
  try{
    var token=await getToken();
    if(!token)throw new Error('no token');
    var r=await fetch(PA_WRITE,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({data:JSON.stringify(data)})
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    setSyncBadge(true,'保存済み');
    setTimeout(function(){setSyncBadge(true,'接続中');},2000);
  }catch(e){
    setSyncBadge(false,'保存失敗(ローカルのみ)');
  }
}

async function loadData(){
  try{
    var latest=await fetchLatestData();
    if(latest){
      evs=latest.evs; maint=latest.maint; cfg=latest.cfg;
      setSyncBadge(true,'接続中');
    }else{
      setSyncBadge(false,'PA未接続');
      try{var ls=localStorage.getItem('3dp_sp_local');if(ls){var d2=JSON.parse(ls);evs=d2.evs||[];maint=Object.assign({s:false,i:false},d2.maint||{});cfg=Object.assign({from:'09:00',to:'17:00',gap:240,weekend:false,wdMode:'weekday',startOffset:60},d2.cfg||{});}}catch(e2){}
    }
  }catch(e){
    setSyncBadge(false,'PA未接続');
    try{var ls=localStorage.getItem('3dp_sp_local');if(ls){var d2=JSON.parse(ls);evs=d2.evs||[];maint=Object.assign({s:false,i:false},d2.maint||{});cfg=Object.assign({from:'09:00',to:'17:00',gap:240,weekend:false,wdMode:'weekday',startOffset:60},d2.cfg||{});}}catch(e2){}
  }
  updateMaintBtns();render();
}

function startPolling(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(function(){loadData();},POLL_INTERVAL);
}

// ===== MAINT =====
function updateMaintBtns(){

// ===== AUTO PLACE =====
// dataOv: オプションのデータオーバーライド（最新サーバーデータで検索する場合に使用）
function findSlot(durMin, prefPrinter, dataOv){
  var _evs=dataOv?dataOv.evs:evs, _maint=dataOv?dataOv.maint:maint, _cfg=dataOv?dataOv.cfg:cfg;
  var fromP=_cfg.from.split(':');var toP=_cfg.to.split(':');
  var wStart=+fromP[0]*60+ +fromP[1];var wEnd=+toP[0]*60+ +toP[1];
  var printers=['sankawa','iwate'].filter(function(p){return!(p==='sankawa'?_maint.s:_maint.i)});
  if(prefPrinter&&printers.indexOf(prefPrinter)>=0)printers=[prefPrinter].concat(printers.filter(function(p){return p!==prefPrinter}));
  if(!printers.length)return null;
  var now=new Date();var today=new Date();today.setHours(0,0,0,0);
  for(var dayOffset=0;dayOffset<21;dayOffset++){
    var d=new Date(today);d.setDate(today.getDate()+dayOffset);
    var dow=d.getDay();var isWeekend=(dow===0||dow===6);
    var mode=_cfg.wdMode||'weekday';
    if(mode==='weekday'&&isWeekend)continue;
    if(mode==='weekend'&&!isWeekend)continue;
    var ds=fmtD(d);
    for(var pi=0;pi<printers.length;pi++){
      var pr=printers[pi];
      var dayEvs=_evs.filter(function(ev){return ev.day===ds&&ev.printer===pr}).sort(function(a,b){return toMin(a.sH,a.sM)-toMin(b.sH,b.sM)});
      var earliest=wStart;
      if(dayOffset===0){var nowMin=now.getHours()*60+now.getMinutes()+(_cfg.startOffset||60);nowMin=Math.ceil(nowMin/15)*15;earliest=Math.max(wStart,nowMin);}
      var blocked=dayEvs.map(function(ev){return{s:toMin(ev.sH,ev.sM)-_cfg.gap,e:toMin(ev.eH,ev.eM)+_cfg.gap}});
      var cursor=earliest;
      while(cursor+durMin<=wEnd){
        var ok=true;
        for(var bi=0;bi<blocked.length;bi++){var b=blocked[bi];if(cursor<b.e&&cursor+durMin>b.s){ok=false;cursor=b.e;break;}}
        if(ok)return{day:ds,printer:pr,startMin:cursor,endMin:cursor+durMin};
      }
    }
  }
  return null;
}

  for(var d=0;d<14;d++){

      var dcol=document.createElement('div');dcol.style.cssText='position:relative;height:'+th+'px'+(d2<13?';border-right:1px solid var(--border)':'');
      var lanesEl=document.createElement('div');lanesEl.style.cssText='position:absolute;inset:0;display:flex';
      ['s','i'].forEach(function(pk){
        var pr=pk==='s'?'sankawa':'iwate';
        var lane=document.createElement('div');lane.className='lane lane-'+pk+(maint[pk]?' lane-maint':'');
        for(var hr=0;hr<24;hr++){var gl=document.createElement('div');gl.style.cssText='position:absolute;left:0;right:0;top:'+hrTop(hr)+'px;height:'+hrH(hr)+'px;border-bottom:1px solid var(--border)'+(hr<8||hr>20?';background:rgba(0,0,0,0.15)':'');lane.appendChild(gl);}
        if(!maint[pk]){
          lane.style.cursor='pointer';
          lane.addEventListener('click',function(e){if(dragEv)return;openJobModal(null,ds,pr);});
        }
        lane.addEventListener('dragover',function(e){
          e.preventDefault();
          document.querySelectorAll('.lane-over').forEach(function(l){l.classList.remove('lane-over')});
          document.querySelectorAll('.dprev').forEach(function(el){el.remove()});
          if(!dragEv||maint[pk])return;
          lane.classList.add('lane-over');

          var acc=0,cHr=0,cFr=0;for(var hr=0;hr<24;hr++){var hh=hrH(hr);if(y<acc+hh){cHr=hr;cFr=(y-acc)/hh;break;}acc+=hh;}
          var rawMin=cHr*60+Math.round(cFr*60/15)*15;var dur=toMin(dragEv.eH,dragEv.eM)-toMin(dragEv.sH,dragEv.sM);
          var ns=rawMin,ne=ns+dur;var top=hrTop(Math.floor(ns/60))+(ns%60)/60*hrH(Math.floor(ns/60));var neh=Math.min(Math.floor(ne/60),23);var bot=hrTop(neh)+(ne%60)/60*hrH(neh);

        lane.addEventListener('drop',async function(e){
          e.preventDefault();lane.classList.remove('lane-over');document.querySelectorAll('.dprev').forEach(function(el){el.remove()});
          if(!dragEv||maint[pk])return;
          var rect=lane.getBoundingClientRect();var y=e.clientY-rect.top;
          var acc=0,cHr=0,cFr=0;for(var hr=0;hr<24;hr++){var hh=hrH(hr);if(y<acc+hh){cHr=hr;cFr=(y-acc)/hh;break;}acc+=hh;}
          var rawMin=cHr*60+Math.round(cFr*60/15)*15;var dur=toMin(dragEv.eH,dragEv.eM)-toMin(dragEv.sH,dragEv.sM);

          if(idx>=0){data.evs[idx].day=ds;data.evs[idx].sH=Math.floor(ns/60);data.evs[idx].sM=ns%60;data.evs[idx].eH=Math.floor(ne/60);data.evs[idx].eM=ne%60;data.evs[idx].printer=pr;}
          await persistWithData(data);render();
        });
        evs.filter(function(ev){return ev.day===ds&&ev.printer===pr}).forEach(function(ev){
          var c=UC[ev.u]||UC.low;
          var top=hrTop(ev.sH)+ev.sM/60*hrH(ev.sH);var neh=Math.min(ev.eH,23);var bot=hrTop(neh)+ev.eM/60*hrH(neh);
          var eb=document.createElement('div');eb.className='ev';
          eb.style.cssText='top:'+top+'px;height:'+Math.max(bot-top-1,10)+'px;background:'+c.bg+';border-left:3px solid '+c.bd+';color:'+c.tx;
          eb.draggable=true;
          var h2=bot-top;
          eb.innerHTML='<div class="ev-title">'+(ev.cont||'(無題)')+'</div>'+(h2>22?'<div class="ev-sub">'+(ev.req?ev.req+' ':'')+fmtHm(ev.sH,ev.sM)+'–'+fmtHm(ev.eH,ev.eM)+'</div>':'');
          eb.addEventListener('click',function(e){e.stopPropagation();openJobModal(ev,ev.day,ev.printer);});
          eb.addEventListener('dragstart',function(e){dragEv=ev;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',ev.id);setTimeout(function(){eb.style.opacity='0.3';},0);});
          eb.addEventListener('dragend',function(){eb.style.opacity='';dragEv=null;document.querySelectorAll('.lane-over').forEach(function(l){l.classList.remove('lane-over')});document.querySelectorAll('.dprev').forEach(function(el){el.remove()});});
          lane.appendChild(eb);
        });
        lanesEl.appendChild(lane);
      });
      dcol.appendChild(lanesEl);body.appendChild(dcol);
    })(d);
  }
  ci.appendChild(body);
}

// ===== JOB MODAL =====
function openJobModal(ev, day, pr){
  var ov=makeOv();var box=makeBox();var isEdit=!!ev;

  var ptI=document.createElement('div');ptI.className='pt';ptI.textContent='🖨 岩手';ptI.dataset.key='iwate';
  function updPT(){[ptS,ptI].forEach(function(p){var k=p.dataset.key;if(k===curP){p.style.background=k==='sankawa'?'rgba(79,172,254,0.15)':'rgba(67,233,123,0.12)';p.style.color=k==='sankawa'?'#4facfe':'#43e97b';p.style.borderColor=k==='sankawa'?'#4facfe':'#43e97b';p.style.borderWidth='1px';}else{p.style.background='';p.style.color='var(--text2)';p.style.borderColor='var(--border)';p.style.borderWidth='1px';}});}

  ptW.appendChild(ptS);ptW.appendChild(ptI);
  var ptField=document.createElement('div');ptField.className='fl';ptField.appendChild(mLabel('希望プリンター'));ptField.appendChild(ptW);
  box.appendChild(ptField);updPT();

  // Duration

  box.appendChild(mDivider());

  var inReq=mInput('text',ev?ev.req||'':'','名前');

  box.appendChild(mField('依頼者',inReq));
  box.appendChild(mField('内容（品名）',inCont));

  // Urgency
  var curU=(ev&&ev.u)||'low';
  var uDefs=[{k:'low',bg:'rgba(79,172,254,0.15)',tx:'#4facfe',label:'低'},{k:'mid',bg:'rgba(67,233,123,0.12)',tx:'#43e97b',label:'中'},{k:'high',bg:'rgba(247,151,30,0.15)',tx:'#f7971e',label:'高'},{k:'urgent',bg:'rgba(248,54,0,0.15)',tx:'#ff6b6b',label:'超緊急'}];
  var ubar=document.createElement('div');ubar.className='ubar';var uBtns={};
  uDefs.forEach(function(ud){var ub=document.createElement('div');ub.className='uo';ub.style.background=ud.bg;ub.style.color=ud.tx;ub.textContent=ud.label;uBtns[ud.k]=ub;ub.addEventListener('click',function(){curU=ud.k;updU()});ubar.appendChild(ub);});
  function updU(){uDefs.forEach(function(ud){uBtns[ud.k].style.borderColor=ud.k===curU?ud.tx:'transparent';});}
  updU();

    var slot=findSlot(durMin,curP,searchData);
    if(!slot){statusEl.style.display='block';statusEl.textContent='⚠ 21日以内に空きが見つかりませんでした。設定を確認してください。';savebtn.disabled=false;savebtn.textContent=isEdit?'空きを探して更新':'空きを探して追加';return;}
    var newEv={id:isEdit?ev.id:String(Date.now()),day:slot.day,sH:Math.floor(slot.startMin/60),sM:slot.startMin%60,eH:Math.floor(slot.endMin/60),eM:slot.endMin%60,printer:slot.printer,u:curU,req:inReq.value,cont:inCont.value,memo:inMemo.value};
    if(isEdit){var idx=latest.evs.findIndex(function(x){return x.id===ev.id});if(idx>=0)latest.evs[idx]=newEv;else latest.evs.push(newEv);}
    else latest.evs.push(newEv);
    await persistWithData(latest);
    var evDate=new Date(slot.day);var tw=new Date();tw.setHours(0,0,0,0);tw.setDate(tw.getDate()-tw.getDay());var ew=new Date(evDate);ew.setDate(evDate.getDate()-evDate.getDay());
    wOff=Math.round((ew-tw)/(7*24*3600*1000));

  });

  var note=document.createElement('div');note.className='modal-note';note.textContent='稼働時間帯・間隔は⚙設定から変更できます';box.appendChild(note);
  ov.appendChild(box);ov.addEventListener('click',function(e){if(e.target===ov)document.body.removeChild(ov)});
  document.body.appendChild(ov);
}

  var cb=document.createElement('button');cb.className='btn';cb.textContent='キャンセル';cb.addEventListener('click',function(){document.body.removeChild(ov)});
  var sb=document.createElement('button');sb.className='btn btn-primary';sb.textContent='保存';
  sb.addEventListener('click',async function(){
    // 最新データを取得してから設定だけ上書き（同時編集対応）
    var data=(await fetchLatestData())||localData();
    data.cfg.from=inFrom.value||'09:00';data.cfg.to=inTo.value||'17:00';data.cfg.gap=parseInt(inGap.value)||240;data.cfg.startOffset=parseInt(inOffset.value)||60;data.cfg.weekend=(wdMode!=='weekday');data.cfg.wdMode=wdMode;
    await persistWithData(data);document.body.removeChild(ov);showToast('✓ 設定を保存しました');
  });
  brow.appendChild(cb);brow.appendChild(sb);box.appendChild(brow);
  ov.appendChild(box);ov.addEventListener('click',function(e){if(e.target===ov)document.body.removeChild(ov)});
  document.body.appendChild(ov);
}

// ===== TOAST =====
function showToast(msg){
  var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},400);},2800);
}

// ===== INIT =====
document.getElementById('btnPrev').addEventListener('click',function(){wOff--;render()});
document.getElementById('btnNext').addEventListener('click',function(){wOff++;render()});
document.getElementById('btnAdd').addEventListener('click',function(){openJobModal(null,fmtD(new Date()),'sankawa')});
document.getElementById('btnSettings').addEventListener('click',openSettings);
document.getElementById('mb-s').addEventListener('click',async function(){
  var data=(await fetchLatestData())||localData();
  data.maint.s=!data.maint.s;
  await persistWithData(data);updateMaintBtns();render();
});
document.getElementById('mb-i').addEventListener('click',async function(){
  var data=(await fetchLatestData())||localData();
  data.maint.i=!data.maint.i;
  await persistWithData(data);updateMaintBtns();render();
});

loadData();
startPolling();
</script>
</body>
</html>
